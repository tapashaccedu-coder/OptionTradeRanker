<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512">
  <rect width="512" height="512" rx="92" fill="#09090e"/>
  <!-- Subtle grid lines -->
  <line x1="0" y1="256" x2="512" y2="256" stroke="rgba(0,212,255,0.06)" stroke-width="1"/>
  <line x1="256" y1="0" x2="256" y2="512" stroke="rgba(0,212,255,0.06)" stroke-width="1"/>
  <!-- Outer ring -->
  <circle cx="256" cy="256" r="194" fill="none" stroke="rgba(0,212,255,0.18)" stroke-width="12"/>
  <!-- Diamond -->
  <rect x="159" y="159" width="194" height="194" rx="20"
        fill="none" stroke="rgba(0,212,255,0.55)" stroke-width="12" transform="rotate(45 256 256)"/>
  <!-- Center dot -->
  <circle cx="256" cy="256" r="30" fill="#00d4ff"/>
  <!-- OR text -->
  <text x="256" y="258" text-anchor="middle" dominant-baseline="middle"
        font-family="monospace" font-weight="700" fill="#00d4ff"
        font-size="133" letter-spacing="-1"
        opacity="0.85">OR</text>
</svg>