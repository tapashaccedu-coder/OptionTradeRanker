<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <meta name="theme-color" content="#09090e" />
  <title>Offline — OptionRank Lite</title>
  <style>
    *, *::before, *::after { box-sizing: border-box; }
    html, body {
      margin: 0; padding: 0;
      min-height: 100vh;
      background: #09090e;
      color: #a0a0bc;
      font-family: "Space Mono", "Courier New", monospace;
      -webkit-font-smoothing: antialiased;
    }
    body {
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      padding: 2rem;
      text-align: center;
      /* grid background */
      background-image:
        linear-gradient(rgba(0,212,255,0.018) 1px, transparent 1px),
        linear-gradient(90deg, rgba(0,212,255,0.018) 1px, transparent 1px);
      background-size: 48px 48px;
    }
    .icon {
      width: 64px; height: 64px;
      margin-bottom: 2rem;
      border: 1.5px solid rgba(0,212,255,0.25);
      border-radius: 14px;
      display: flex; align-items: center; justify-content: center;
      background: rgba(0,212,255,0.04);
    }
    .icon svg { width: 28px; height: 28px; color: #00d4ff; }
    h1 {
      margin: 0 0 0.75rem;
      font-size: 1.25rem;
      font-weight: 700;
      color: #eeeef5;
      letter-spacing: -0.01em;
    }
    p {
      margin: 0 0 2rem;
      font-size: 0.8125rem;
      line-height: 1.7;
      color: #64647e;
      max-width: 360px;
    }
    .pill {
      display: inline-block;
      font-size: 0.6875rem;
      letter-spacing: 0.1em;
      text-transform: uppercase;
      color: rgba(0,212,255,0.5);
      border: 1px solid rgba(0,212,255,0.15);
      border-radius: 999px;
      padding: 0.375rem 1rem;
      margin-bottom: 0.75rem;
    }
    button {
      display: inline-flex; align-items: center; gap: 0.5rem;
      font-family: inherit;
      font-size: 0.8125rem;
      font-weight: 700;
      letter-spacing: 0.1em;
      text-transform: uppercase;
      padding: 0.625rem 1.5rem;
      border-radius: 0.5rem;
      border: none;
      background: #00d4ff;
      color: #09090e;
      cursor: pointer;
      transition: background 120ms;
    }
    button:hover { background: #33ddff; }
    .note {
      margin-top: 2.5rem;
      font-size: 0.6875rem;
      color: #36364a;
      letter-spacing: 0.05em;
    }
  </style>
</head>
<body>
  <div class="pill">OptionRank Lite</div>

  <div class="icon">
    <svg viewBox="0 0 24 24" fill="none" xmlns="http://www.w3.org/2000/svg">
      <path d="M1 1l22 22M16.72 11.06A10.94 10.94 0 0119 12.55M5 12.55a10.94 10.94 0 0115.17-9.12M10.71 5.05A16 16 0 0122.56 9M1.42 9a15.91 15.91 0 014.7-2.88M8.53 16.11a6 6 0 016.95 0M12 20h.01"
        stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"/>
    </svg>
  </div>

  <h1>You're offline</h1>
  <p>
    No internet connection detected. Cached pages and your saved trade journal
    are still available — reconnect to load new data.
  </p>

  <button onclick="window.location.reload()">
    <svg width="14" height="14" viewBox="0 0 24 24" fill="none">
      <path d="M1 4v6h6M23 20v-6h-6" stroke="currentColor" stroke-width="2.2"
        stroke-linecap="round" stroke-linejoin="round"/>
      <path d="M20.49 9A9 9 0 005.64 5.64L1 10m22 4l-4.64 4.36A9 9 0 013.51 15"
        stroke="currentColor" stroke-width="2.2"
        stroke-linecap="round" stroke-linejoin="round"/>
    </svg>
    Try again
  </button>

  <p class="note">localStorage data is available offline</p>
</body>
</html>
